<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ButeraNet Solutions — IT Proposal for Kings Cathedral Maui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F8FAFC; color: #1E293B; }
  input[type=range] { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  navy:"#1F4E79", navy2:"#0B1F3A", blue:"#2E75B6", lblue:"#D5E8F0",
  ink:"#1E293B", muted:"#64748B", line:"#E2E8F0", bg:"#F8FAFC", white:"#FFFFFF",
  green:"#0F7B55", red:"#B91C1C", amber:"#B45309",
};

// KCO before/after — real engagement metrics, verifiable via Ryan Hopkins (KCO Ops POC)
const KCO = [
  {area:"Documentation", before:"None — no network diagram, no asset inventory, no runbooks", after:"Full documentation: topology, inventory, SOPs, disaster-recovery plan"},
  {area:"Credentials", before:"Undocumented — held informally; prior provider left with no handoff", after:"Encrypted vault — every login documented and owned by the church"},
  {area:"Firewall firmware", before:"Dead / outdated — running unpatched", after:"Current firmware on managed update windows"},
  {area:"Network performance", before:"5,433 ms bufferbloat under load — video calls unusable", after:"Bufferbloat controlled — stable real-time traffic"},
  {area:"Segmentation", before:"Flat network — guests, staff, and finance all on one segment", after:"7-segment VLAN architecture — isolated by function"},
  {area:"WiFi reliability", before:"Frequent association failures", after:"91% reduction in association failures"},
  {area:"Remote management", before:"None — every issue required an on-site visit", after:"Secured remote access via Cloudflare Tunnel"},
];

const NEXT = [
  "Letter of Authorization signed",
  "On-site assessment visit — June 2026",
  "BCAF security assessment completed",
  "Findings report delivered to leadership",
  "Standardization proposal for Maui HQ presented to Dr. Morocco",
];

function App() {
  const [sites, setSites] = useState(1);
  const [fee, setFee] = useState(250);
  const [hiddenOn, setHiddenOn] = useState(false);
  const [hiddenHrs, setHiddenHrs] = useState(5);

  const TOOLING = 206;      // Atera Growth $179 + Hudu $27 — published, fleet-wide
  const HRATE = 35;         // stated, conservative value of informal staff IT time
  const sc = Math.max(1, sites);
  const bnMo = fee + Math.round(TOOLING / sc);          // ButeraNet per-site / month
  const hiddenMo = hiddenOn ? Math.round(hiddenHrs * 4.33 * HRATE) : 0;
  const usd = (n) => "$" + n.toLocaleString();

  const wrap = {maxWidth:1060, margin:"0 auto", padding:"0 24px"};
  const eyebrow = {fontSize:12, fontWeight:800, letterSpacing:2.5, textTransform:"uppercase", color:C.blue};
  const h2 = {fontSize:28, fontWeight:800, color:C.navy, margin:"6px 0 10px", letterSpacing:-0.4};
  const card = {background:C.white, border:`1px solid ${C.line}`, borderRadius:12, padding:22};

  return (
    <div style={{fontFamily:"'Inter',Arial,Helvetica,sans-serif", background:C.bg, color:C.ink, lineHeight:1.6}}>

      {/* HERO */}
      <div style={{background:`linear-gradient(135deg,${C.navy2},${C.navy})`, color:C.white, padding:"66px 0 58px"}}>
        <div style={wrap}>
          <div style={{...eyebrow, color:"#7FB3D9"}}>An IT Proposal &middot; Kings Cathedral Maui</div>
          <h1 style={{fontSize:40, fontWeight:900, lineHeight:1.14, margin:"14px 0 16px", letterSpacing:-1}}>
            A standardized IT foundation &mdash; built once, owned by you.
          </h1>
          <p style={{fontSize:17, color:"#CBD5E1", maxWidth:720}}>
            This page is for Kings Cathedral leadership to make an informed decision. It lays out where Maui HQ
            stands today, what ButeraNet has already delivered at Kings Central Oahu, the real cost of each path
            forward, and exactly what happens if you say yes. Every figure here is either a published price or is
            shown openly as unknown &mdash; nothing is invented.
          </p>
        </div>
      </div>

      {/* CURRENT STANDING */}
      <div style={{padding:"56px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>Where You Stand Today</div>
          <h2 style={h2}>Maui HQ, on the current provider</h2>
          <p style={{color:C.muted, maxWidth:680, marginBottom:22}}>
            Kings Cathedral Maui currently runs under Higher Ground IT. From the on-site observations to date, the
            picture is concerning &mdash; and the true cost of it is not visible.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>
            {[
              {h:"Cost", t:"Not disclosed. The current monthly spend was not shared and the contract has not been reviewed — leadership is paying for IT without seeing the number."},
              {h:"Resilience", t:"WatchGuard firewall with unconfirmed subscription status; Microsoft 365 active but renewal ownership unknown. Single points of quiet failure."},
              {h:"Knowledge", t:"No documentation, no credential handoff. IT knowledge lives informally with one minister — not with the organization."},
            ].map((x,i)=>(
              <div key={i} style={{...card, borderTop:`3px solid ${C.amber}`}}>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.amber, marginBottom:6}}>{x.h}</div>
                <div style={{fontSize:14, color:C.ink}}>{x.t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* KCO PROOF */}
      <div style={{padding:"56px 0", background:C.white, borderTop:`1px solid ${C.line}`, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>Proof of Execution &mdash; Not a Pitch</div>
          <h2 style={h2}>Kings Central Oahu: before and after ButeraNet</h2>
          <p style={{color:C.muted, maxWidth:720, marginBottom:20}}>
            ButeraNet has already done this work, at a Kings Cathedral site. This is a record, not a promise.
            Dr. Morocco and Ryan Kelly are welcome to verify every line of it directly with Ryan Hopkins, the
            Kings Central Oahu operations point of contact.
          </p>
          <div style={{border:`1px solid ${C.line}`, borderRadius:12, overflow:"hidden"}}>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1.4fr 1.4fr", background:C.navy, color:C.white}}>
              {["Area","Before","After"].map((x,i)=>(
                <div key={i} style={{padding:"10px 14px", fontSize:11, fontWeight:800, letterSpacing:1, textTransform:"uppercase"}}>{x}</div>
              ))}
            </div>
            {KCO.map((r,i)=>(
              <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 1.4fr 1.4fr", borderTop:`1px solid ${C.line}`, background:i%2?C.bg:C.white}}>
                <div style={{padding:"11px 14px", fontSize:13, fontWeight:700, color:C.navy}}>{r.area}</div>
                <div style={{padding:"11px 14px", fontSize:13, color:C.red}}>{r.before}</div>
                <div style={{padding:"11px 14px", fontSize:13, color:C.green}}>{r.after}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12, fontSize:12, color:C.muted, fontStyle:"italic"}}>
            Verification: Ryan Hopkins, Kings Central Oahu operations point of contact.
          </div>
        </div>
      </div>

      {/* INTERACTIVE COST */}
      <div style={{padding:"56px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>The Cost of the Decision</div>
          <h2 style={h2}>What each path actually costs</h2>
          <p style={{color:C.muted, maxWidth:730, marginBottom:22}}>
            Two of the three options will not show you a price. Higher Ground&rsquo;s cost is undisclosed; Spectrum&rsquo;s
            representative provided no figures at all. ButeraNet&rsquo;s cost is below, in full &mdash; adjust the inputs and
            watch it change. Transparency is itself part of the comparison.
          </p>

          {/* Controls */}
          <div style={{...card, marginBottom:18}}>
            <div style={{display:"flex", gap:30, flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.navy}}>Locations</div>
                <div style={{fontSize:26, fontWeight:900, color:C.navy}}>{sites}</div>
                <input type="range" min={1} max={50} value={sites} onChange={e=>setSites(+e.target.value)} style={{width:200, accentColor:C.blue}}/>
                <div style={{fontSize:11, color:C.muted}}>Maui HQ first &mdash; fleet tooling amortizes as locations are added.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.navy}}>ButeraNet fee / site / month</div>
                <div style={{fontSize:26, fontWeight:900, color:C.navy}}>{usd(fee)}</div>
                <input type="range" min={150} max={600} step={25} value={fee} onChange={e=>setFee(+e.target.value)} style={{width:200, accentColor:C.blue}}/>
                <div style={{fontSize:11, color:C.muted}}>Managed-services fee. Hardware is separate, billed at actual cost.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.navy}}>Hidden IT labor burden</div>
                <label style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer", margin:"6px 0"}}>
                  <input type="checkbox" checked={hiddenOn} onChange={e=>setHiddenOn(e.target.checked)} style={{width:16, height:16, accentColor:C.blue}}/>
                  <span style={{fontSize:13}}>Count informal staff IT time</span>
                </label>
                {hiddenOn && (
                  <div>
                    <input type="range" min={1} max={20} value={hiddenHrs} onChange={e=>setHiddenHrs(+e.target.value)} style={{width:200, accentColor:C.amber}}/>
                    <div style={{fontSize:11, color:C.muted}}>{hiddenHrs} hrs/week &times; 4.33 &times; ${HRATE}/hr (stated assumption) = {usd(hiddenMo)}/mo</div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Comparison table */}
          <div style={{border:`1px solid ${C.line}`, borderRadius:12, overflow:"hidden"}}>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1.2fr 1.2fr 1.2fr"}}>
              {[
                {t:"", b:C.navy},
                {t:"Current State — Higher Ground", b:C.amber},
                {t:"Spectrum", b:C.muted},
                {t:"ButeraNet", b:C.green},
              ].map((x,i)=>(
                <div key={i} style={{background:C.navy, color:C.white, padding:"11px 14px", fontSize:12, fontWeight:800}}>{x.t}</div>
              ))}
            </div>
            {[
              {label:"1 Month", mult:1},
              {label:"1 Year", mult:12},
              {label:"5 Years", mult:60},
            ].map((row,i)=>(
              <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 1.2fr 1.2fr 1.2fr", borderTop:`1px solid ${C.line}`}}>
                <div style={{padding:"14px", fontSize:13, fontWeight:800, color:C.navy, background:C.bg}}>{row.label}</div>
                <div style={{padding:"14px", background:"#FFFBEB"}}>
                  <div style={{fontSize:14, fontWeight:700, color:C.amber}}>Not disclosed</div>
                  {hiddenOn && <div style={{fontSize:12, color:C.muted, marginTop:3}}>+ {usd(hiddenMo*row.mult)} hidden labor</div>}
                </div>
                <div style={{padding:"14px", background:C.bg}}>
                  <div style={{fontSize:14, fontWeight:700, color:C.muted}}>Quote-based</div>
                  <div style={{fontSize:12, color:C.muted, marginTop:3}}>No figures provided</div>
                </div>
                <div style={{padding:"14px", background:"#F0FDF4"}}>
                  <div style={{fontSize:18, fontWeight:900, color:C.green}}>{usd(bnMo*row.mult)}</div>
                  <div style={{fontSize:12, color:C.muted, marginTop:3}}>per location</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12, fontSize:12, color:C.muted}}>
            ButeraNet figure = managed-services fee + fleet tooling (Atera $179 + Hudu $27, published) divided across locations.
            One-time hardware is separate and billed at actual distributor cost with zero markup &mdash; the church owns it permanently.
            Internet service is provider-neutral and excluded.
          </div>
        </div>
      </div>

      {/* ONE STANDARD / 900 SITES */}
      <div style={{padding:"56px 0", background:C.navy, color:C.white}}>
        <div style={wrap}>
          <div style={{...eyebrow, color:"#7FB3D9"}}>The Long-Term Value</div>
          <h2 style={{...h2, color:C.white}}>One standard, every site</h2>
          <p style={{fontSize:16, color:"#CBD5E1", maxWidth:740, marginBottom:22}}>
            ButeraNet builds every site from one standardized design &mdash; engineered for minimally-manned and
            zero-manned facilities, where no IT staff sit on site. The standard is deployed and proven at Maui HQ
            first. Once it works there, it is replicable to every Kings Cathedral location &mdash; on the order of
            900 sites &mdash; at actual hardware cost, with no per-site redesign and no licensing. That is a value
            proposition no carrier or break-fix provider can match.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>
            {[
              {h:"Minimally manned", t:"Designed to run reliably with no IT person on site — monitored and managed remotely."},
              {h:"Low cost, by design", t:"No licensing, no markup. Hardware at cost, owned by the church; tooling shared across the fleet."},
              {h:"Replicable", t:"Prove it at Maui HQ, then roll the identical standard to every location — parameterized, never improvised."},
            ].map((x,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:20}}>
                <div style={{fontSize:15, fontWeight:800, marginBottom:6}}>{x.h}</div>
                <div style={{fontSize:13, color:"#CBD5E1"}}>{x.t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* IF HIGHER GROUND FAILS */}
      <div style={{padding:"56px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>The Question No One Has Asked</div>
          <h2 style={h2}>What happens if Higher Ground leaves &mdash; or fails?</h2>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:18}}>
            <div style={{...card, borderTop:`3px solid ${C.red}`}}>
              <div style={{fontSize:13, fontWeight:800, color:C.red, marginBottom:8}}>TODAY &mdash; the honest answer</div>
              <p style={{fontSize:14, color:C.ink}}>
                If Higher Ground terminates the relationship, lets the Microsoft 365 tenant lapse, or their
                WatchGuard security subscription expires &mdash; the result is catastrophic. There is no documentation,
                no credential handoff, and no recovery plan. The organization would be locked out of its own systems
                with no map back in. Recovery would be measured in days, and in lost data.
              </p>
            </div>
            <div style={{...card, borderTop:`3px solid ${C.green}`}}>
              <div style={{fontSize:13, fontWeight:800, color:C.green, marginBottom:8}}>WITH BUTERANET &mdash; self-sufficient</div>
              <p style={{fontSize:14, color:C.ink}}>
                Every credential, diagram, and procedure is documented and handed to the church. SOPs mean staff
                can run routine tasks without calling anyone. The church owns its environment &mdash; the hardware,
                the documentation, the credentials &mdash; regardless of who manages it. ButeraNet is replaceable
                by design. That is the point.
              </p>
            </div>
          </div>
        </div>
      </div>

      {/* SPECTRUM CALLOUT */}
      <div style={{padding:"40px 0", background:C.white, borderTop:`1px solid ${C.line}`, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>A Point of Fact</div>
          <h2 style={h2}>Spectrum: the claim versus the published spec</h2>
          <div style={{...card, background:C.bg, borderLeft:`4px solid ${C.amber}`}}>
            <p style={{fontSize:14, color:C.ink}}>
              Spectrum&rsquo;s representative verbally claimed 1 Gbps symmetric service. Their published Business Internet
              specifications show asymmetric plans &mdash; not symmetric. True symmetric service requires Spectrum
              Dedicated Fiber at roughly $1,000/month, and that fiber infrastructure is not yet available at this
              location. This is stated as a verifiable fact, not a criticism: confirm it against spectrum.com before
              relying on any verbal claim.
            </p>
          </div>
        </div>
      </div>

      {/* NEXT STEPS */}
      <div style={{padding:"56px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>If You Say Yes</div>
          <h2 style={h2}>What happens next &mdash; concretely</h2>
          <p style={{color:C.muted, maxWidth:680, marginBottom:20}}>
            No pressure and no close. This is simply the path, step by step, so leadership knows exactly what
            agreeing to an assessment commits to.
          </p>
          <div style={{...card}}>
            {NEXT.map((s,i)=>(
              <div key={i} style={{display:"flex", alignItems:"center", gap:14, padding:"12px 0", borderTop:i?`1px solid ${C.line}`:"none"}}>
                <div style={{flexShrink:0, width:28, height:28, borderRadius:14, background:C.navy, color:C.white, fontWeight:800, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center"}}>{i+1}</div>
                <div style={{fontSize:15, color:C.ink}}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{background:C.navy2, color:"#CBD5E1", padding:"40px 0", fontSize:13}}>
        <div style={wrap}>
          <div style={{fontWeight:900, fontSize:17, color:C.white}}>ButeraNet Solutions</div>
          <div style={{marginTop:6}}>Managed IT for churches and ministries &middot; Hawaii</div>
          <div style={{marginTop:8}}>buteranet.com &nbsp;&middot;&nbsp; tdbutera@proton.me</div>
          <div style={{marginTop:16, fontSize:11, color:"#64748B", lineHeight:1.6, maxWidth:840}}>
            Prepared for Kings Cathedral leadership. ButeraNet costs reflect published vendor pricing (UniFi, Atera,
            Hudu &mdash; May 2026); the managed-services fee is adjustable above. Higher Ground and Spectrum monthly
            costs were not disclosed or not provided and are shown as such &mdash; no figures are estimated for them.
            Kings Central Oahu metrics are from that engagement and are verifiable with its operations point of
            contact. This page is informational and is not a binding quote or contract.
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
