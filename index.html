<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ButeraNet Solutions — IT Proposal for Kings Cathedral Maui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F8FAFC; color: #1E293B; }
  input[type=range] { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  navy:"#1F4E79", navy2:"#0B1F3A", blue:"#2E75B6", lblue:"#D5E8F0",
  ink:"#1E293B", muted:"#64748B", line:"#E2E8F0", bg:"#F8FAFC", white:"#FFFFFF",
  green:"#0F7B55", red:"#B91C1C", amber:"#B45309",
};

// KCO — network modernization actually completed. Verifiable with Ryan Hopkins (KCO Ops POC).
const KCO = [
  {area:"Firewall firmware", before:"Dead / outdated — running unpatched", after:"Current firmware on managed update windows"},
  {area:"Network performance", before:"5,433 ms bufferbloat under load — video calls unusable", after:"Bufferbloat controlled — stable real-time traffic"},
  {area:"Segmentation", before:"Flat network — guests, staff, and finance on one segment", after:"7-segment VLAN architecture, isolated by function"},
  {area:"WiFi reliability", before:"Frequent association failures", after:"91% reduction in association failures"},
  {area:"Remote management", before:"None — every issue required an on-site visit", after:"Secured remote access via Cloudflare Tunnel"},
];

// Extensive 3-way attribute comparison. e = where the edge sits, stated plainly.
const ATTRS = [
  {a:"Network platform", c:"WatchGuard M290 firewall, Extreme APs, consumer switch", s:"Cisco Meraki — MX firewall, switches, APs", b:"UniFi — gateway, switching, access points", e:"Reference"},
  {a:"Hardware ownership", c:"Mixed; firewall ownership not confirmed", s:"Spectrum-owned; returned or disabled at contract end", b:"Church owns every piece permanently", e:"ButeraNet"},
  {a:"Licensing model", c:"WatchGuard security subscription required", s:"Cisco Meraki per-device licensing required", b:"None — UniFi has no per-device or per-feature licensing", e:"ButeraNet"},
  {a:"If the license / subscription lapses", c:"7-day grace, then security services (IPS, antivirus, filtering) disabled", s:"30-day grace, then devices become non-operational", b:"Nothing to lapse — hardware keeps running", e:"ButeraNet"},
  {a:"If the relationship ends", c:"Per contract; security tied to the subscription", s:"Hardware reclaimed or disabled", b:"Church keeps everything; no recurring fee; it keeps working", e:"ButeraNet"},
  {a:"Recurring cost structure", c:"Security subscription + service fee", s:"Per-device licensing + managed-service fee (quote-based)", b:"Managed-services fee + shared tooling; no device licensing", e:"ButeraNet"},
  {a:"Internet circuit", c:"Separate", s:"Included — Spectrum is the carrier", b:"Separate", e:"Spectrum"},
  {a:"24/7 support / NOC", c:"Business hours, informal", s:"24/7 staffed network operations center", b:"Business hours + emergency response; solo operator", e:"Spectrum"},
  {a:"SLA with financial penalties", c:"None documented", s:"Uptime SLA with financial penalties", b:"Defined response times; no financial penalty", e:"Spectrum"},
  {a:"Scale & financial backing", c:"Small local firm", s:"National carrier (Charter Communications)", b:"Solo practice", e:"Spectrum"},
  {a:"Service scope", c:"Firewall-focused", s:"Network hardware only", b:"Full stack — network, endpoints, Microsoft 365, security, documentation", e:"ButeraNet"},
  {a:"Endpoint management (workstations)", c:"None observed", s:"Not offered", b:"Included — monitoring and patching on every device", e:"ButeraNet"},
  {a:"Documentation handed to the church", c:"None", s:"None", b:"Full handover — diagrams, inventory, SOPs, credentials", e:"ButeraNet"},
  {a:"Network segmentation", c:"Flat network observed", s:"VLANs supported; client must configure", b:"Standardized 7-segment design, built in", e:"ButeraNet"},
  {a:"Local / on-site presence", c:"Local", s:"National; on-site is a dispatch", b:"Local, same-island", e:"Even — HG & ButeraNet"},
  {a:"Change control", c:"No documented policy", s:"Zero-day patches pushed without advance notice", b:"Patches in maintenance windows around services", e:"ButeraNet"},
  {a:"Multi-site standardization", c:"Per-site, varies", s:"Meraki dashboard manages multiple sites", b:"One standard, replicable to every location", e:"Even — Spectrum & ButeraNet"},
];

const NEXT = [
  "Letter of Authorization signed",
  "On-site assessment visit — June 2026",
  "BCAF security assessment completed",
  "Findings report delivered to leadership",
  "Standardization proposal for Maui HQ presented to Dr. Morocco",
];

function App() {
  const [sites, setSites] = useState(1);
  const [fee, setFee] = useState(250);
  const [curCost, setCurCost] = useState(0);
  const [spCost, setSpCost] = useState(0);
  const [hiddenOn, setHiddenOn] = useState(false);
  const [hiddenHrs, setHiddenHrs] = useState(5);
  const [hRate, setHRate] = useState(35);

  const TOOLING = 206;   // Atera Growth $179 + Hudu $27 — published, fleet-wide
  const HRATE = 35;      // stated, conservative value of informal staff IT time
  const sc = Math.max(1, sites);
  const bnMo = fee + Math.round(TOOLING / sc);
  const hiddenMo = hiddenOn ? Math.round(hiddenHrs * 4.33 * hRate) : 0;
  const curMo = (curCost || 0) + hiddenMo;
  const usd = (n) => "$" + Math.round(n).toLocaleString();

  const wrap = {maxWidth:1060, margin:"0 auto", padding:"0 24px"};
  const eyebrow = {fontSize:12, fontWeight:800, letterSpacing:2.5, textTransform:"uppercase", color:C.blue};
  const h2 = {fontSize:28, fontWeight:800, color:C.navy, margin:"6px 0 10px", letterSpacing:-0.4};
  const card = {background:C.white, border:`1px solid ${C.line}`, borderRadius:12, padding:22};
  const edgeColor = (e) => e==="ButeraNet"?C.green : e==="Spectrum"?C.blue : C.muted;

  return (
    <div style={{fontFamily:"'Inter',Arial,Helvetica,sans-serif", background:C.bg, color:C.ink, lineHeight:1.6}}>

      {/* HERO */}
      <div style={{background:`linear-gradient(135deg,${C.navy2},${C.navy})`, color:C.white, padding:"64px 0 56px"}}>
        <div style={wrap}>
          <div style={{...eyebrow, color:"#7FB3D9"}}>An IT Proposal &middot; Kings Cathedral Maui</div>
          <h1 style={{fontSize:38, fontWeight:900, lineHeight:1.16, margin:"14px 0 16px", letterSpacing:-0.8}}>
            A standardized IT foundation for Kings Cathedral Maui.
          </h1>
          <p style={{fontSize:17, color:"#CBD5E1", maxWidth:730}}>
            This page is prepared for Kings Cathedral leadership to compare options side by side. It documents the
            network work ButeraNet has completed at Kings Central Oahu, sets out an extensive three-way comparison,
            and shows ButeraNet&rsquo;s cost in full. Every figure here is either a published price or is shown openly
            as unknown. Nothing is estimated for another provider.
          </p>
        </div>
      </div>

      {/* CURRENT STANDING */}
      <div style={{padding:"54px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>Where Maui HQ Stands Today</div>
          <h2 style={h2}>The current picture</h2>
          <p style={{color:C.muted, maxWidth:700, marginBottom:22}}>
            Kings Cathedral Maui currently runs under Higher Ground IT. The notes below are factual observations,
            for leadership to weigh.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>
            {[
              {h:"Cost", t:"What Higher Ground IT costs per month is known to Kings Cathedral, not to ButeraNet. The comparison below leaves that figure for you to enter."},
              {h:"Microsoft 365", t:"Microsoft 365 is current — renewed or renewing — and is administered through Higher Ground IT. It works today; it also means tenant control and staff-account changes depend on the current provider."},
              {h:"Firewall & knowledge", t:"A WatchGuard M290 firewall, whose security services run on a subscription. IT knowledge is held informally; no documentation has been handed to the organization."},
            ].map((x,i)=>(
              <div key={i} style={{...card, borderTop:`3px solid ${C.blue}`}}>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.blue, marginBottom:6}}>{x.h}</div>
                <div style={{fontSize:14}}>{x.t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* KCO PROOF */}
      <div style={{padding:"54px 0", background:C.white, borderTop:`1px solid ${C.line}`, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>Proof of Execution</div>
          <h2 style={h2}>Network modernization completed at Kings Central Oahu</h2>
          <p style={{color:C.muted, maxWidth:730, marginBottom:20}}>
            ButeraNet has already done this work at a Kings Cathedral site. The table below is the network work
            completed and measurable at Kings Central Oahu &mdash; a record, not a projection. Documentation handover
            and credential transfer are part of ButeraNet&rsquo;s standard process and are described later as part of the
            offer; they are not claimed as finished here.
          </p>
          <div style={{border:`1px solid ${C.line}`, borderRadius:12, overflow:"hidden"}}>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1.4fr 1.4fr", background:C.navy, color:C.white}}>
              {["Area","Before","After"].map((x,i)=>(
                <div key={i} style={{padding:"10px 14px", fontSize:11, fontWeight:800, letterSpacing:1, textTransform:"uppercase"}}>{x}</div>
              ))}
            </div>
            {KCO.map((r,i)=>(
              <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 1.4fr 1.4fr", borderTop:`1px solid ${C.line}`, background:i%2?C.bg:C.white}}>
                <div style={{padding:"11px 14px", fontSize:13, fontWeight:700, color:C.navy}}>{r.area}</div>
                <div style={{padding:"11px 14px", fontSize:13, color:C.muted}}>{r.before}</div>
                <div style={{padding:"11px 14px", fontSize:13, color:C.green}}>{r.after}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12, fontSize:12, color:C.muted, fontStyle:"italic"}}>
            Verification: Ryan Hopkins, Kings Central Oahu operations point of contact.
          </div>
        </div>
      </div>

      {/* COST */}
      <div style={{padding:"54px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>The Cost of the Decision</div>
          <h2 style={h2}>Cost &mdash; and savings &mdash; over one month, one year, five years</h2>
          <p style={{color:C.muted, maxWidth:760, marginBottom:22}}>
            Enter the monthly figures you have for Higher Ground IT and for Spectrum &mdash; whatever each one quotes
            you. ButeraNet&rsquo;s cost is shown in full and updates with the sliders. The table shows each path side by
            side, and the savings panel shows the difference, in either direction, honestly.
          </p>

          <div style={{...card, marginBottom:18}}>
            <div style={{display:"flex", gap:26, flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.amber}}>Higher Ground IT &mdash; monthly</div>
                <div style={{marginTop:4}}>
                  <span style={{fontSize:20, fontWeight:900, color:C.navy}}>$</span>
                  <input type="number" min={0} value={curCost||""} placeholder="enter" onChange={e=>setCurCost(+e.target.value||0)}
                    style={{fontSize:18, fontWeight:800, color:C.navy, width:110, border:`1px solid ${C.line}`, borderRadius:6, padding:"2px 8px"}}/>
                </div>
                <div style={{fontSize:11, color:C.muted}}>Your current spend &mdash; only you have it.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.blue}}>Spectrum &mdash; monthly</div>
                <div style={{marginTop:4}}>
                  <span style={{fontSize:20, fontWeight:900, color:C.navy}}>$</span>
                  <input type="number" min={0} value={spCost||""} placeholder="if quoted" onChange={e=>setSpCost(+e.target.value||0)}
                    style={{fontSize:18, fontWeight:800, color:C.navy, width:110, border:`1px solid ${C.line}`, borderRadius:6, padding:"2px 8px"}}/>
                </div>
                <div style={{fontSize:11, color:C.muted}}>Enter Spectrum&rsquo;s figure once they provide one.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.navy}}>Locations</div>
                <div style={{fontSize:24, fontWeight:900, color:C.navy}}>{sites}</div>
                <input type="range" min={1} max={900} value={sites} onChange={e=>setSites(+e.target.value)} style={{width:170, accentColor:C.blue}}/>
                <div style={{fontSize:11, color:C.muted}}>Fleet tooling amortizes as locations are added.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.green}}>ButeraNet fee / site / month</div>
                <div style={{fontSize:24, fontWeight:900, color:C.green}}>{usd(fee)}</div>
                <input type="range" min={200} max={600} step={25} value={fee} onChange={e=>setFee(+e.target.value)} style={{width:170, accentColor:C.green}}/>
                <div style={{fontSize:11, color:C.muted}}>Managed-services fee. Hardware separate, at actual cost.</div>
              </div>
              <div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:C.navy}}>Hidden IT labor</div>
                <label style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer", margin:"6px 0"}}>
                  <input type="checkbox" checked={hiddenOn} onChange={e=>setHiddenOn(e.target.checked)} style={{width:16, height:16, accentColor:C.blue}}/>
                  <span style={{fontSize:13}}>Add informal staff IT time to current state</span>
                </label>
                {hiddenOn && (
                  <div>
                    <input type="range" min={1} max={20} value={hiddenHrs} onChange={e=>setHiddenHrs(+e.target.value)} style={{width:190, accentColor:C.amber}}/>
                    <input type="range" min={25} max={50} step={5} value={hRate} onChange={e=>setHRate(+e.target.value)} style={{width:190, accentColor:C.amber, display:"block", marginTop:4}}/>
                    <div style={{fontSize:11, color:C.muted}}>{hiddenHrs} hrs/week &times; 4.33 &times; ${hRate}/hr = {usd(hiddenMo)}/mo &mdash; adjust both to your own estimate</div>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{border:`1px solid ${C.line}`, borderRadius:12, overflow:"hidden"}}>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1.2fr 1.2fr 1.2fr"}}>
              {["","Higher Ground IT","Spectrum","ButeraNet"].map((x,i)=>(
                <div key={i} style={{background:C.navy, color:C.white, padding:"11px 14px", fontSize:12, fontWeight:800}}>{x}</div>
              ))}
            </div>
            {[{label:"1 Month", m:1},{label:"1 Year", m:12},{label:"5 Years", m:60}].map((row,i)=>(
              <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 1.2fr 1.2fr 1.2fr", borderTop:`1px solid ${C.line}`}}>
                <div style={{padding:"14px", fontSize:13, fontWeight:800, color:C.navy, background:C.bg}}>{row.label}</div>
                <div style={{padding:"14px", background:"#FFFBEB"}}>
                  {curCost>0 || hiddenOn
                    ? <div><div style={{fontSize:16, fontWeight:800, color:C.amber}}>{usd(curMo*row.m)}</div>
                        <div style={{fontSize:11, color:C.muted}}>{curCost>0?"entered figure":"hidden labor only"}{hiddenOn&&curCost>0?" + hidden labor":""}</div></div>
                    : <div style={{fontSize:13, color:C.muted}}>Enter a figure above</div>}
                </div>
                <div style={{padding:"14px", background:C.bg}}>
                  {spCost>0
                    ? <div style={{fontSize:16, fontWeight:800, color:C.blue}}>{usd(spCost*row.m)}</div>
                    : <div style={{fontSize:13, color:C.muted}}>Enter a figure above</div>}
                </div>
                <div style={{padding:"14px", background:"#F0FDF4"}}>
                  <div style={{fontSize:18, fontWeight:900, color:C.green}}>{usd(bnMo*row.m)}</div>
                  <div style={{fontSize:11, color:C.muted}}>per location</div>
                </div>
              </div>
            ))}
          </div>

          {(curCost>0 || spCost>0) && (
            <div style={{...card, marginTop:18}}>
              <div style={{fontSize:13, fontWeight:800, color:C.navy, marginBottom:10}}>The difference &mdash; ButeraNet vs. each option</div>
              {[
                {name:"vs. Higher Ground IT", base:curMo, on:curCost>0},
                {name:"vs. Spectrum", base:spCost, on:spCost>0},
              ].filter(x=>x.on).map((x,i)=>{
                var d = x.base - bnMo;
                var cheaper = d>=0;
                return (
                  <div key={i} style={{display:"flex", gap:18, flexWrap:"wrap", alignItems:"baseline", padding:"9px 0", borderTop:i?`1px solid ${C.line}`:"none"}}>
                    <div style={{fontSize:13, fontWeight:700, color:C.navy, minWidth:180}}>ButeraNet {x.name}</div>
                    {[{l:"1 mo",m:1},{l:"1 yr",m:12},{l:"5 yr",m:60}].map((h,j)=>(
                      <div key={j} style={{fontSize:13}}>
                        <span style={{color:C.muted}}>{h.l}: </span>
                        <span style={{fontWeight:800, color:cheaper?C.green:C.amber}}>
                          {cheaper ? usd(d*h.m)+" saved" : usd(-d*h.m)+" more"}
                        </span>
                      </div>
                    ))}
                  </div>
                );
              })}
              <div style={{fontSize:11, color:C.muted, marginTop:10, fontStyle:"italic"}}>
                Calculated from the figures entered above. Where ButeraNet costs more, that is shown plainly, not hidden.
              </div>
            </div>
          )}

          <div style={{marginTop:12, fontSize:12, color:C.muted}}>
            ButeraNet figure = managed-services fee + fleet tooling (Atera $179 + Hudu $27, published) divided across
            locations. One-time hardware is separate, billed at actual distributor cost with no markup, and owned by
            the church. Internet service is provider-neutral and excluded. Higher Ground and Spectrum figures are
            whatever you enter; nothing is estimated on their behalf.
          </div>
        </div>
      </div>

      {/* 3-WAY COMPARISON */}
      <div style={{padding:"54px 0", background:C.white, borderTop:`1px solid ${C.line}`, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>The Comparison</div>
          <h2 style={h2}>Three paths, attribute by attribute</h2>
          <p style={{color:C.muted, maxWidth:740, marginBottom:20}}>
            An honest side-by-side. ButeraNet holds the advantage on ownership, licensing, and scope; Spectrum holds
            it on round-the-clock support, contractual SLA, and carrier scale. The &ldquo;Edge&rdquo; column states where each
            line lands &mdash; including the lines where ButeraNet is not the stronger choice.
          </p>
          <div style={{border:`1px solid ${C.line}`, borderRadius:12, overflow:"hidden", fontSize:12.5}}>
            <div style={{display:"grid", gridTemplateColumns:"1.1fr 1.3fr 1.3fr 1.3fr 0.7fr", background:C.navy, color:C.white}}>
              {["Attribute","Current State (HG)","Spectrum","ButeraNet","Edge"].map((x,i)=>(
                <div key={i} style={{padding:"10px 12px", fontWeight:800, fontSize:11}}>{x}</div>
              ))}
            </div>
            {ATTRS.map((r,i)=>(
              <div key={i} style={{display:"grid", gridTemplateColumns:"1.1fr 1.3fr 1.3fr 1.3fr 0.7fr", borderTop:`1px solid ${C.line}`, background:i%2?C.bg:C.white}}>
                <div style={{padding:"10px 12px", fontWeight:700, color:C.navy}}>{r.a}</div>
                <div style={{padding:"10px 12px", color:C.ink}}>{r.c}</div>
                <div style={{padding:"10px 12px", color:C.ink}}>{r.s}</div>
                <div style={{padding:"10px 12px", color:C.ink}}>{r.b}</div>
                <div style={{padding:"10px 12px", fontWeight:800, color:edgeColor(r.e)}}>{r.e}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* LICENSING & OWNERSHIP */}
      <div style={{padding:"54px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>Licensing &amp; Ownership</div>
          <h2 style={h2}>What happens if a license is not renewed</h2>
          <p style={{color:C.muted, maxWidth:740, marginBottom:20}}>
            This is the single most consequential difference, and it is documented by the vendors themselves &mdash;
            verifiable, not opinion.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>
            {[
              {h:"Current State — WatchGuard", c:C.amber, t:"7-day grace period after the security subscription expires, then antivirus, intrusion prevention, and content filtering are disabled and configuration changes can no longer be saved.", src:"WatchGuard documentation"},
              {h:"Spectrum — Cisco Meraki", c:C.red, t:"30-day grace period after a license expires, then the network devices shut down and become non-operational until new licensing is purchased.", src:"Cisco Meraki documentation"},
              {h:"ButeraNet — UniFi", c:C.green, t:"No per-device or per-feature licensing exists. There is nothing to expire. The hardware keeps running indefinitely, and the church owns it outright.", src:"UniFi product model"},
            ].map((x,i)=>(
              <div key={i} style={{...card, borderTop:`3px solid ${x.c}`}}>
                <div style={{fontSize:12, fontWeight:800, color:x.c, marginBottom:6}}>{x.h}</div>
                <div style={{fontSize:13.5, marginBottom:8}}>{x.t}</div>
                <div style={{fontSize:11, color:C.muted, fontStyle:"italic"}}>Source: {x.src}</div>
              </div>
            ))}
          </div>
          <div style={{...card, marginTop:18, background:C.lblue, border:"none"}}>
            <div style={{fontSize:14, color:C.navy}}>
              <strong>What ButeraNet offers instead:</strong> full ownership of the hardware, no required network-device licensing,
              and no recurring fee owed if Kings Cathedral ever chooses to move on &mdash; the equipment, the
              documentation, and the credentials remain the church&rsquo;s, and everything keeps working. The relationship
              is held by service, not by a license that can be switched off.
            </div>
          </div>
        </div>
      </div>

      {/* SELF-SUFFICIENCY */}
      <div style={{padding:"54px 0", background:C.white, borderTop:`1px solid ${C.line}`, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>Self-Sufficiency by Design</div>
          <h2 style={h2}>You are never locked in &mdash; not even to ButeraNet</h2>
          <p style={{color:C.muted, maxWidth:740, marginBottom:20}}>
            The largest risk in the current setup is that IT knowledge lives with the provider, not with the church.
            If that provider leaves, the organization is stranded. Every ButeraNet engagement is built to remove that
            risk: the environment is documented and handed to Kings Cathedral as it is built.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>
            {[
              {h:"Credentials", t:"Every login — firewall, switches, server, Microsoft 365, ISP account — documented and handed to the church, stored securely."},
              {h:"Procedures", t:"Written SOPs for routine tasks, so staff can handle day-to-day work without calling anyone."},
              {h:"Documentation", t:"Network diagrams, device inventory, and a disaster-recovery plan — the full map of the environment, owned by Kings Cathedral."},
            ].map((x,i)=>(
              <div key={i} style={{...card, borderTop:`3px solid ${C.green}`}}>
                <div style={{fontSize:12, fontWeight:800, color:C.green, marginBottom:6}}>{x.h}</div>
                <div style={{fontSize:13.5}}>{x.t}</div>
              </div>
            ))}
          </div>
          <div style={{...card, marginTop:18, background:C.lblue, border:"none"}}>
            <div style={{fontSize:14, color:C.navy}}>
              The test of a good IT partner is whether you could replace them without disruption. With ButeraNet you
              always could &mdash; the hardware, the credentials, and the documentation are the church&rsquo;s. The
              relationship continues on the strength of the service, not on dependency.

      {/* ONE STANDARD */}
      <div style={{padding:"54px 0", background:C.navy, color:C.white}}>

                <div style={{fontSize:13, color:"#CBD5E1"}}>{x.t}</div>
              </div>

          </div>
        </div>
      </div>

      {/* SPECTRUM NOTE */}
      <div style={{padding:"40px 0", background:C.white, borderBottom:`1px solid ${C.line}`}}>
        <div style={wrap}>
          <div style={eyebrow}>A Point of Fact</div>
          <h2 style={h2}>Spectrum: the verbal claim and the published spec</h2>
          <div style={{...card, background:C.bg, borderLeft:`4px solid ${C.amber}`}}>
            <p style={{fontSize:14}}>
              Spectrum&rsquo;s representative verbally described 1 Gbps symmetric service. Spectrum&rsquo;s published Business
              Internet specifications list asymmetric plans &mdash; not symmetric. True symmetric service is provided
              through Spectrum Dedicated Fiber &mdash; a premium product at a substantially higher monthly cost &mdash; and that fiber infrastructure is not yet
              available at this location. This is stated so leadership can confirm it directly against spectrum.com
              before relying on a verbal figure &mdash; a point of fact, not a criticism.
            </p>
          </div>
        </div>
      </div>

      {/* NEXT STEPS */}
      <div style={{padding:"54px 0"}}>
        <div style={wrap}>
          <div style={eyebrow}>If You Say Yes</div>
          <h2 style={h2}>What happens next</h2>
          <p style={{color:C.muted, maxWidth:680, marginBottom:20}}>
            The path step by step, so leadership knows exactly what agreeing to an assessment commits to.
          </p>
          <div style={card}>
            {NEXT.map((s,i)=>(
              <div key={i} style={{display:"flex", alignItems:"center", gap:14, padding:"12px 0", borderTop:i?`1px solid ${C.line}`:"none"}}>

      {/* FOOTER */}
      <div style={{background:C.navy2, color:"#CBD5E1", padding:"40px 0", fontSize:13}}>
        <div style={wrap}>
          <div style={{fontWeight:900, fontSize:17, color:C.white}}>ButeraNet Solutions</div>
          <div style={{marginTop:6}}>Managed IT for churches and ministries &middot; Hawaii</div>
          <div style={{marginTop:8}}>buteranet.com &nbsp;&middot;&nbsp; travis@buteranet.com</div>
          <div style={{marginTop:16, fontSize:11, color:"#64748B", lineHeight:1.6, maxWidth:850}}>
            Prepared for Kings Cathedral leadership. ButeraNet costs reflect published vendor pricing (UniFi, Atera,

            entered by the reader; Spectrum provided no figures &mdash; neither is estimated. Licensing-expiration
            behavior is per Cisco Meraki and WatchGuard published documentation. Kings Central Oahu metrics are from
            that engagement and verifiable with its operations point of contact. This page is informational and is
            not a binding quote or contract.
          </div>
        </div>
      </div>

    </div>
  );
